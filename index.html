<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gin Rummy Scoring App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-bg: #e8f5e9;
      --green-text: #2e7d32;
      --green-border: #a5d6a7;
      --red-bg: #ffebee;
      --red-text: #c62828;
      --red-border: #ef9a9a;
      --surface: #ffffff;
      --surface-2: #f5f3ef;
      --surface-3: #ece9e3;
      --text-primary: #1a1a18;
      --text-secondary: #6b6860;
      --text-tertiary: #a09e9b;
      --border: #e0ddd8;
      --border-strong: #c8c5bf;
      --accent: #3d6b4f;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --green-bg: #1b3a1e;
        --green-text: #81c784;
        --green-border: #2e5c32;
        --red-bg: #3b1a1a;
        --red-text: #ef9a9a;
        --red-border: #5c2e2e;
        --surface: #1e1d1b;
        --surface-2: #252422;
        --surface-3: #2c2b28;
        --text-primary: #f0ede8;
        --text-secondary: #9b9892;
        --text-tertiary: #6b6860;
        --border: #333129;
        --border-strong: #4a4840;
        --accent: #81c784;
        --shadow: 0 1px 3px rgba(0,0,0,0.3);
      }
    }

    html { font-size: 16px; }
    body { font-family: 'DM Sans', sans-serif; background: var(--surface-2); color: var(--text-primary); min-height: 100vh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: .875rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: var(--shadow);
    }
    .header-left { display: flex; align-items: baseline; gap: 10px; }
    header h1 { font-family: 'DM Serif Display', serif; font-size: 1.25rem; font-weight: 400; letter-spacing: -0.01em; }
    .hand-badge { font-size: 12px; color: var(--text-secondary); background: var(--surface-3); padding: 2px 10px; border-radius: 20px; border: 1px solid var(--border); }
    .header-actions { display: flex; gap: 6px; align-items: center; }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 11px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all .15s;
    }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text-primary); }
    .btn-ghost.danger { color: var(--red-text); border-color: var(--red-border); }
    .btn-ghost.danger:hover { background: var(--red-bg); }

    .save-indicator { font-size: 11px; color: var(--text-tertiary); transition: color .3s; white-space: nowrap; }
    .save-indicator.fresh { color: var(--green-text); }

    /* Save/Load panel */
    .panel-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 30;
      align-items: flex-end;
      justify-content: center;
    }
    .panel-overlay.open { display: flex; }
    .panel {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%;
      max-width: 560px;
      padding: 1.25rem 1.25rem 2.5rem;
      border-top: 1px solid var(--border);
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .panel-title { font-size: 15px; font-weight: 500; }
    .panel-close { background: none; border: none; font-size: 22px; color: var(--text-tertiary); cursor: pointer; line-height: 1; padding: 2px 6px; }
    .panel-close:hover { color: var(--text-primary); }

    .panel-section { margin-bottom: 1.25rem; }
    .panel-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-tertiary); margin-bottom: 8px; }
    .panel-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .panel-btn {
      flex: 1;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-primary);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all .15s;
      text-align: center;
    }
    .panel-btn:hover { background: var(--surface-3); }
    .panel-btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
    .panel-btn.accent:hover { opacity: .88; }

    .panel-textarea {
      width: 100%;
      height: 72px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      font-size: 11px;
      font-family: monospace;
      background: var(--surface-3);
      color: var(--text-primary);
      resize: none;
      outline: none;
      margin-bottom: 8px;
      word-break: break-all;
    }
    .panel-textarea:focus { border-color: var(--accent); }
    .panel-msg { font-size: 12px; min-height: 18px; margin-top: 6px; }
    .panel-msg.ok { color: var(--green-text); }
    .panel-msg.err { color: var(--red-text); }

    #fileInput { display: none; }

    .main { max-width: 560px; margin: 0 auto; padding: 1.25rem 1rem 3rem; }

    .setup-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
    .setup-label { font-size: 13px; color: var(--text-secondary); }
    .player-tabs { display: flex; gap: 4px; }
    .player-tab {
      padding: 5px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all .15s;
    }
    .player-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .player-tab:not(.active):hover { background: var(--surface-3); }

    .scores-grid { display: grid; gap: 10px; margin-bottom: 1.25rem; }
    .score-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.125rem; box-shadow: var(--shadow); }
    .score-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .score-card-name { display: flex; align-items: center; gap: 6px; }
    .score-card-name span { font-size: 13px; color: var(--text-secondary); }
    .edit-name-btn { background: none; border: none; cursor: pointer; color: var(--text-tertiary); font-size: 13px; padding: 2px 4px; border-radius: 4px; transition: all .15s; line-height: 1; }
    .edit-name-btn:hover { color: var(--text-primary); background: var(--surface-3); }
    .leading-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--green-bg); color: var(--green-text); border: 1px solid var(--green-border); }
    .score-card-total { font-family: 'DM Serif Display', serif; font-size: 2rem; font-weight: 400; line-height: 1; }
    .name-edit-input { font-size: 13px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 3px 8px; background: var(--surface); color: var(--text-primary); width: 110px; outline: none; }
    .name-edit-input:focus { border-color: var(--accent); }

    .section-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; }
    .player-entries { display: grid; gap: 10px; margin-bottom: 1.25rem; }

    .entry-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.125rem; box-shadow: var(--shadow); transition: border-color .2s, opacity .2s; }
    .entry-card.committed { border-color: var(--green-border); opacity: .7; }
    .entry-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
    .entry-name { font-size: 14px; font-weight: 500; white-space: nowrap; padding-top: 2px; }
    .pending-display { flex: 1; text-align: right; display: flex; align-items: baseline; justify-content: flex-end; flex-wrap: wrap; gap: 4px; min-width: 0; }
    .pending-terms { font-size: 13px; color: var(--text-primary); line-height: 1.6; word-break: break-word; text-align: right; }
    .pending-eq { font-size: 13px; color: var(--text-tertiary); }
    .pending-total { font-family: 'DM Serif Display', serif; font-size: 1.35rem; font-weight: 400; line-height: 1; white-space: nowrap; }
    .pending-total.pos { color: var(--green-text); }
    .pending-total.neg { color: var(--red-text); }
    .pending-total.zero { color: var(--text-tertiary); }
    .committed-badge { font-size: 12px; color: var(--green-text); display: flex; align-items: center; gap: 4px; padding-top: 2px; }

    .btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
    .inc-btn { padding: 8px 0; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .12s; border: 1px solid transparent; }
    .inc-btn:active { transform: scale(0.96); }
    .inc-btn.pos { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
    .inc-btn.pos:hover { filter: brightness(0.95); }
    .inc-btn.neg { background: var(--red-bg); color: var(--red-text); border-color: var(--red-border); }
    .inc-btn.neg:hover { filter: brightness(0.95); }

    .entry-actions { display: flex; gap: 6px; }
    .commit-btn { flex: 1; padding: 8px 0; border-radius: var(--radius-sm); border: 1px solid var(--accent); background: var(--accent); color: #fff; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .15s; }
    .commit-btn:hover { opacity: .88; }
    .commit-btn:disabled { opacity: .35; cursor: default; }
    .clear-btn { padding: 8px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .15s; }
    .clear-btn:hover { background: var(--surface-3); }

    .log-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .log-header { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1.125rem; border-bottom: 1px solid var(--border); }
    .log-title { font-size: 13px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .06em; }
    .log-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
    .log-table th { text-align: left; padding: 6px 1.125rem; font-size: 11px; color: var(--text-tertiary); font-weight: 400; text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); }
    .log-table td { padding: 7px 1.125rem; border-bottom: 1px solid var(--border); }
    .log-table tr:last-child td { border-bottom: none; }
    .hand-cell { color: var(--text-tertiary); font-size: 12px; }
    .score-pos { color: var(--green-text); }
    .score-neg { color: var(--red-text); }
    .score-sub { color: var(--text-tertiary); font-size: 11px; }
    .log-empty { padding: 1.5rem; text-align: center; color: var(--text-tertiary); font-size: 13px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Gin Rummy Scoring App</h1>
    <span class="hand-badge" id="handBadge">Hand 1</span>
  </div>
  <div class="header-actions">
    <span class="save-indicator" id="saveIndicator">Saved</span>
    <button class="btn-ghost" onclick="openPanel()">Save / Load</button>
    <button class="btn-ghost danger" onclick="confirmReset()">Reset</button>
  </div>
</header>

<!-- Save/Load panel -->
<div class="panel-overlay" id="panelOverlay" onclick="overlayClick(event)">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Save / Load game</span>
      <button class="panel-close" onclick="closePanel()">×</button>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Export — save your game</div>
      <div class="panel-row">
        <button class="panel-btn" onclick="downloadFile()">⬇ Download file</button>
        <button class="panel-btn" onclick="copyCode()">⎘ Copy game code</button>
      </div>
      <div class="panel-msg ok" id="exportMsg"></div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Import — restore a saved game</div>
      <div class="panel-row">
        <button class="panel-btn" onclick="document.getElementById('fileInput').click()">⬆ Import from file</button>
      </div>
      <input type="file" id="fileInput" accept=".json" onchange="importFile(event)" />
      <div class="panel-section-title" style="margin-top:12px;margin-bottom:6px;">Or paste a game code:</div>
      <textarea class="panel-textarea" id="importTextarea" placeholder="Paste game code here…"></textarea>
      <button class="panel-btn accent" onclick="importCode()" style="width:100%;">Import game code</button>
      <div class="panel-msg" id="importMsg"></div>
    </div>
  </div>
</div>

<div style="text-align:center;padding:.5rem 1rem .25rem;font-size:12px;color:var(--text-tertiary);font-style:italic;">Made by Bev in South Minneapolis.</div>

<div class="main">
  <div class="setup-bar">
    <span class="setup-label">Players:</span>
    <div class="player-tabs" id="playerTabs">
      <button class="player-tab" data-n="2">2</button>
      <button class="player-tab" data-n="3">3</button>
      <button class="player-tab" data-n="4">4</button>
    </div>
  </div>

  <div class="scores-grid" id="scoresGrid"></div>

  <div class="section-label">Hand entry</div>
  <div class="player-entries" id="playerEntries"></div>

  <div class="log-section">
    <div class="log-header">
      <span class="log-title">Score log</span>
    </div>
    <div id="logContainer"></div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'ginRummyState_v1';
  const DEFAULT_NAMES = ['Player 1', 'Player 2', 'Player 3', 'Player 4'];
  const INCREMENTS = [
    { label: '+5',  val: 5,   cls: 'pos' },
    { label: '+10', val: 10,  cls: 'pos' },
    { label: '+15', val: 15,  cls: 'pos' },
    { label: '−5',  val: -5,  cls: 'neg' },
    { label: '−10', val: -10, cls: 'neg' },
    { label: '−15', val: -15, cls: 'neg' },
  ];

  const defaultState = () => ({
    numPlayers: 2,
    names: [...DEFAULT_NAMES],
    scores: [0, 0, 0, 0],
    pending: [0, 0, 0, 0],
    pendingTerms: [[], [], [], []],
    committed: [false, false, false, false],
    currentHand: 1,
    log: []
  });

  let state = loadState();
  let saveTimer = null;

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (!parsed.pendingTerms) parsed.pendingTerms = [[], [], [], []];
        return parsed;
      }
    } catch(e) {}
    return defaultState();
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      flashSaved();
    } catch(e) {}
  }

  function flashSaved() {
    clearTimeout(saveTimer);
    const el = document.getElementById('saveIndicator');
    el.textContent = '✓ Saved';
    el.classList.add('fresh');
    saveTimer = setTimeout(() => {
      el.textContent = 'Saved';
      el.classList.remove('fresh');
    }, 1500);
  }

  // ── Panel ──────────────────────────────────────────────
  function openPanel() {
    document.getElementById('panelOverlay').classList.add('open');
    document.getElementById('exportMsg').textContent = '';
    document.getElementById('importMsg').textContent = '';
    document.getElementById('importTextarea').value = '';
  }
  function closePanel() {
    document.getElementById('panelOverlay').classList.remove('open');
  }
  function overlayClick(e) {
    if (e.target === document.getElementById('panelOverlay')) closePanel();
  }

  // ── Export ─────────────────────────────────────────────
  function stateToCode() {
    return btoa(unescape(encodeURIComponent(JSON.stringify(state))));
  }

  function downloadFile() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'gin-rummy-game.json';
    a.click();
    URL.revokeObjectURL(url);
    showMsg('exportMsg', '✓ File downloaded — save it to Files or iCloud', true);
  }

  function copyCode() {
    const code = stateToCode();
    if (navigator.clipboard) {
      navigator.clipboard.writeText(code)
        .then(() => showMsg('exportMsg', '✓ Game code copied to clipboard', true))
        .catch(() => fallbackCopy(code));
    } else {
      fallbackCopy(code);
    }
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try {
      document.execCommand('copy');
      showMsg('exportMsg', '✓ Game code copied to clipboard', true);
    } catch(e) {
      showMsg('exportMsg', 'Could not copy automatically — select all text above and copy manually', false);
    }
    document.body.removeChild(ta);
  }

  // ── Import ─────────────────────────────────────────────
  function validateState(obj) {
    return obj
      && typeof obj.numPlayers === 'number'
      && Array.isArray(obj.scores)
      && Array.isArray(obj.names)
      && Array.isArray(obj.log);
  }

  function applyImport(obj) {
    if (!obj.pendingTerms) obj.pendingTerms = [[], [], [], []];
    state = obj;
    saveState();
    closePanel();
    init();
  }

  function importFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const obj = JSON.parse(ev.target.result);
        if (!validateState(obj)) throw new Error('Invalid');
        if (confirm('This will replace the current game. Continue?')) applyImport(obj);
      } catch(err) {
        showMsg('importMsg', "⚠ Couldn't read that file. Make sure it's a Gin Rummy save file.", false);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  function importCode() {
    const raw = document.getElementById('importTextarea').value.trim();
    if (!raw) { showMsg('importMsg', 'Paste a game code first.', false); return; }
    try {
      const obj = JSON.parse(decodeURIComponent(escape(atob(raw))));
      if (!validateState(obj)) throw new Error('Invalid');
      if (confirm('This will replace the current game. Continue?')) applyImport(obj);
    } catch(err) {
      showMsg('importMsg', "⚠ That code doesn't look right. Make sure you copied the whole thing.", false);
    }
  }

  function showMsg(id, msg, ok) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'panel-msg ' + (ok ? 'ok' : 'err');
  }

  // ── Core ───────────────────────────────────────────────
  function init() {
    document.querySelectorAll('.player-tab').forEach(btn => {
      btn.classList.toggle('active', +btn.dataset.n === state.numPlayers);
      btn.onclick = () => {
        if (+btn.dataset.n === state.numPlayers) return;
        if (state.log.length > 0 || state.scores.some(s => s !== 0)) {
          if (!confirm('Changing player count will reset the game. Continue?')) return;
        }
        const s = defaultState();
        s.numPlayers = +btn.dataset.n;
        state = s;
        saveState();
        init();
      };
    });
    document.getElementById('handBadge').textContent = 'Hand ' + state.currentHand;
    renderScores();
    renderEntries();
    renderLog();
  }

  function renderScores() {
    const n = state.numPlayers;
    const cols = n <= 2 ? 'repeat(2,1fr)' : n === 3 ? 'repeat(3,1fr)' : 'repeat(2,1fr)';
    const sg = document.getElementById('scoresGrid');
    sg.style.gridTemplateColumns = cols;
    const maxScore = Math.max(...state.scores.slice(0, n));
    sg.innerHTML = Array.from({ length: n }, (_, i) => `
      <div class="score-card">
        <div class="score-card-top">
          <div class="score-card-name" id="nameDisplay-${i}">
            <span>${state.names[i]}</span>
            <button class="edit-name-btn" onclick="startEditName(${i})" title="Edit name">✎</button>
          </div>
          ${state.scores[i] === maxScore && maxScore !== 0 ? '<span class="leading-badge">Leading</span>' : ''}
        </div>
        <div class="score-card-total">${state.scores[i]}</div>
      </div>
    `).join('');
  }

  function startEditName(i) {
    const display = document.getElementById('nameDisplay-' + i);
    display.innerHTML = `
      <input class="name-edit-input" id="nameInput-${i}" value="${state.names[i]}" maxlength="16" />
      <button class="edit-name-btn" onclick="saveName(${i})" title="Save">✓</button>`;
    const inp = document.getElementById('nameInput-' + i);
    inp.focus(); inp.select();
    inp.onkeydown = e => {
      if (e.key === 'Enter') saveName(i);
      if (e.key === 'Escape') renderScores();
    };
  }

  function saveName(i) {
    const inp = document.getElementById('nameInput-' + i);
    const val = inp ? inp.value.trim() : '';
    if (val) state.names[i] = val;
    saveState();
    renderScores(); renderEntries(); renderLog();
  }

  function buildPendingDisplay(i) {
    const terms = state.pendingTerms[i];
    const total = state.pending[i];
    if (terms.length === 0) {
      return `<span class="pending-total zero">0</span>`;
    }
    const termsStr = terms.map((v, idx) => {
      const sign = v > 0 ? '+' : '';
      return idx === 0 ? `${sign}${v}` : ` ${sign}${v}`;
    }).join('');
    const cls = total > 0 ? 'pos' : total < 0 ? 'neg' : 'zero';
    const sign = total > 0 ? '+' : '';
    if (terms.length === 1) {
      return `<span class="pending-total ${cls}">${sign}${total}</span>`;
    }
    return `<span class="pending-terms">${termsStr}</span><span class="pending-eq"> =</span> <span class="pending-total ${cls}">${sign}${total}</span>`;
  }

  function renderEntries() {
    const n = state.numPlayers;
    const pe = document.getElementById('playerEntries');
    pe.innerHTML = Array.from({ length: n }, (_, i) => {
      const hasTerms = state.pendingTerms[i].length > 0;
      const done = state.committed[i];
      return `
      <div class="entry-card${done ? ' committed' : ''}">
        <div class="entry-header">
          <span class="entry-name">${state.names[i]}</span>
          ${done
            ? `<span class="committed-badge">✓ Scored</span>`
            : `<div class="pending-display">${buildPendingDisplay(i)}</div>`
          }
        </div>
        ${done ? '' : `
        <div class="btn-row">
          ${INCREMENTS.map(inc => `<button class="inc-btn ${inc.cls}" onclick="addPending(${i},${inc.val})">${inc.label}</button>`).join('')}
        </div>
        <div class="entry-actions">
          <button class="commit-btn" onclick="commitScore(${i})" ${!hasTerms ? 'disabled' : ''}>Add score</button>
          <button class="clear-btn" onclick="clearPending(${i})">Clear</button>
        </div>`}
      </div>`;
    }).join('');
  }

  function addPending(i, v) {
    state.pending[i] += v;
    state.pendingTerms[i].push(v);
    saveState();
    renderEntries();
  }

  function clearPending(i) {
    state.pending[i] = 0;
    state.pendingTerms[i] = [];
    saveState();
    renderEntries();
  }

  function commitScore(i) {
    if (state.pendingTerms[i].length === 0) return;
    state.scores[i] += state.pending[i];
    state.log.push({
      hand: state.currentHand,
      player: i,
      added: state.pending[i],
      total: state.scores[i]
    });
    state.pending[i] = 0;
    state.pendingTerms[i] = [];
    state.committed[i] = true;
    const allDone = Array.from({ length: state.numPlayers }, (_, j) => state.committed[j]).every(Boolean);
    if (allDone) {
      state.currentHand++;
      state.committed = [false, false, false, false];
    }
    saveState();
    document.getElementById('handBadge').textContent = 'Hand ' + state.currentHand;
    renderScores(); renderEntries(); renderLog();
  }

  function renderLog() {
    const el = document.getElementById('logContainer');
    if (state.log.length === 0) {
      el.innerHTML = '<div class="log-empty">No hands recorded yet</div>';
      return;
    }
    const n = state.numPlayers;
    const hands = {};
    state.log.forEach(r => {
      if (!hands[r.hand]) hands[r.hand] = {};
      hands[r.hand][r.player] = { added: r.added, total: r.total };
    });
    const rows = Object.keys(hands).sort((a, b) => b - a).map(h => {
      const cols = Array.from({ length: n }, (_, i) => {
        const e = hands[h][i];
        if (!e) return '<td style="color:var(--text-tertiary)">—</td>';
        const sign = e.added > 0 ? '+' : '';
        const cls = e.added > 0 ? 'score-pos' : e.added < 0 ? 'score-neg' : '';
        return `<td><span class="${cls}">${sign}${e.added}</span> <span class="score-sub">(${e.total})</span></td>`;
      }).join('');
      return `<tr><td class="hand-cell">Hand ${h}</td>${cols}</tr>`;
    }).join('');
    const thCols = Array.from({ length: n }, (_, i) => `<th>${state.names[i]}</th>`).join('');
    el.innerHTML = `<table class="log-table">
      <thead><tr><th style="width:70px">Hand</th>${thCols}</tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function confirmReset() {
    if (confirm('Reset the game? All scores and history will be cleared.')) {
      const n = state.numPlayers;
      const names = [...state.names];
      state = defaultState();
      state.numPlayers = n;
      state.names = names;
      saveState();
      init();
    }
  }

  init();
</script>
</body>
</html>
